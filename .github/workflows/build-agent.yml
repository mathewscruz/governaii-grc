name: Build & publish Akuris Endpoint Agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      SUPABASE_URL: https://lnlkahtugwmkznasapfd.supabase.co
      SUPABASE_BUCKET: endpoint-agent-binaries
      SUPABASE_OBJECT_KEY: akuris-agent.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Build akuris-agent.exe
        working-directory: agent
        run: |
          go mod tidy
          if (!(Test-Path dist)) { New-Item -ItemType Directory -Path dist | Out-Null }
          go build -ldflags="-s -w" -o dist\akuris-agent.exe .\cmd\akuris-agent
          Get-Item dist\akuris-agent.exe | Format-List Name,Length

      - name: Upload to Supabase Storage
        shell: pwsh
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if (-not $env:SERVICE_ROLE_KEY) {
            Write-Error "Missing secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          }
          $url = "$env:SUPABASE_URL/storage/v1/object/$env:SUPABASE_BUCKET/$env:SUPABASE_OBJECT_KEY"
          $headers = @{
            "Authorization" = "Bearer $env:SERVICE_ROLE_KEY"
            "apikey"        = "$env:SERVICE_ROLE_KEY"
            "Content-Type"  = "application/octet-stream"
            "x-upsert"      = "true"
            "Cache-Control" = "max-age=300"
          }
          Write-Host "Uploading to $url ..."
          Invoke-RestMethod -Method Put -Uri $url -Headers $headers `
            -InFile agent\dist\akuris-agent.exe
          Write-Host "✓ Uploaded akuris-agent.exe"

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: akuris-agent
          path: agent/dist/akuris-agent.exe
          retention-days: 14
